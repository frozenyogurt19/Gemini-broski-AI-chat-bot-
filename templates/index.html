<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Broski</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe3;
    --brown: #5c3d1e;
    --brown-light: #c4a882;
    --card-bg: #faf7f2;
    --text: #2c1f0e;
    --text-muted: #8a7560;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e0d5;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  font-family: 'DM Sans', sans-serif;
}

.phone {
  background: var(--bg);
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(92,61,30,0.18);
  overflow: hidden;
}

  .phone::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(196,168,130,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding-top: 16px;
  }

  .icon-wrap {
    width: 72px; height: 72px;
    background: var(--brown);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(92,61,30,0.3);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .icon-wrap svg { width: 36px; height: 36px; fill: #fff; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 220px;
  }

  .features {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .feature-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(92,61,30,0.06);
    transition: transform 0.2s;
  }

  .feature-card:hover { transform: translateY(-2px); }

  .feature-icon {
    width: 38px; height: 38px;
    background: var(--bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .feature-icon svg { width: 18px; height: 18px; stroke: var(--brown); fill: none; stroke-width: 1.8; }

  .feature-text h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .feature-text p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .spacer { flex: 1; }

  .btn {
    margin-top: 32px;
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn:hover { background: #4a3018; }
  .btn:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="phone">
  <div class="hero">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
      </svg>
    </div>
    <h1>Gemini broski</h1>
    <p class="subtitle">Ask questions, get instant answers, and explore endless possibilities with AI-powered conversations</p>
  </div>

  <div class="features">
    <div class="feature-card">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <div class="feature-text">
        <h3>Natural Conversations</h3>
        <p>Chat naturally and get intelligent responses</p>
      </div>
    </div>

    <div class="feature-card">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div class="feature-text">
        <h3>Instant Answers</h3>
        <p>Get quick responses powered by advanced AI</p>
      </div>
    </div>
  </div>

  <div class="spacer"></div>
  <button class="btn" onclick="location.href='/chat'">Get Started</button>
</div>
</body>
</html>
