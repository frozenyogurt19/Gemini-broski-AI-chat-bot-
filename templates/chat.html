<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Broski — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe3;
    --brown: #5c3d1e;
    --brown-light: #c4a882;
    --card-bg: #faf7f2;
    --text: #2c1f0e;
    --text-muted: #8a7560;
    --bubble-model: #e8dfd4;
    --bubble-user: #5c3d1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e0d5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
}

.phone {
  background: var(--bg);
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(92,61,30,0.18);
  overflow: hidden;
}

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 20px 20px 16px;
    gap: 12px;
    background: var(--bg);
    border-bottom: 1px solid rgba(92,61,30,0.08);
    flex-shrink: 0;
  }

  .menu-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; gap: 4px; padding: 4px;
  }

  .menu-btn span {
    display: block; width: 20px; height: 2px;
    background: var(--brown); border-radius: 2px;
  }

  .header-avatar {
    width: 34px; height: 34px;
    background: var(--brown);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .header-avatar svg { width: 18px; height: 18px; fill: #fff; }

  .header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--text);
    flex: 1;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 0; }

  .bubble-wrap {
    display: flex;
    opacity: 0;
    animation: fadeUp 0.3s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble-wrap.model { justify-content: flex-start; }
  .bubble-wrap.user  { justify-content: flex-end; }

  .bubble {
    max-width: 72%;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.55;
  }

  .bubble-wrap.model .bubble {
    background: var(--bubble-model);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .bubble-wrap.user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 14px;
    background: var(--bubble-model);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--brown-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input */
  .input-area {
    padding: 12px 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border-top: 1px solid rgba(92,61,30,0.08);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--card-bg);
    border-radius: 24px;
    padding: 10px 16px;
    box-shadow: 0 2px 8px rgba(92,61,30,0.07);
  }

  .input-wrap input {
    width: 100%;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }

  .input-wrap input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--brown);
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #4a3018; }
  .send-btn:active { transform: scale(0.9); }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <button class="menu-btn" onclick="location.href='/history'">
      <span></span><span></span><span></span>
    </button>
    <div class="header-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    </div>
    <h2>Gemini broski</h2>
  </div>

  <div class="messages" id="messages">
    <div class="bubble-wrap model">
      <div class="bubble">Yo! I'm Gemini broski. What's up? How can I help you today?</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
    </div>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    const messages = document.getElementById('messages');

    // Add user bubble
    const userWrap = document.createElement('div');
    userWrap.className = 'bubble-wrap user';
    userWrap.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(userWrap);
    input.value = '';

    // Show typing indicator
    const typingWrap = document.createElement('div');
    typingWrap.className = 'bubble-wrap model';
    typingWrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    messages.appendChild(typingWrap);

    messages.scrollTop = messages.scrollHeight;

    // 🐧 code blow send POST to flask using fetch
    fetch('/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ messages: text })
    })
    .then(response => response.json())
    .then(data => {
      typingWrap.remove();
      const modelWrap = document.createElement('div');
      modelWrap.className = 'bubble-wrap model';
      modelWrap.innerHTML = `<div class="bubble">${data.reply}</div>`;
      messages.appendChild(modelWrap);
      messages.scrollTop = messages.scrollHeight;
    });



  }
</script>
</body>
</html>
